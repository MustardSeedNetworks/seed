# Dependabot configuration for automated dependency updates
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Keep GitHub Actions up to date. Workflows are SHA-pinned (#955);
  # Dependabot detects the SHA+tag-comment format and updates both.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group minor/patch updates so we don't get 17 PRs every week.
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # download-artifact v8 enforces a stricter digest check that is
      # incompatible with artifacts produced by upload-artifact v7 (which
      # has no v8 release yet), so a v7-uploaded artifact intermittently
      # fails the v8 download with `digest-mismatch: error` under the
      # concurrent restores of the 8-way E2E shard matrix. Pin both to v7
      # until upload-artifact ships a matching v8 and bump them together.
      - dependency-name: "actions/download-artifact"
        update-types: ["version-update:semver-major"]

  # Keep Go dependencies up to date
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group minor and patch updates
    groups:
      go-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Keep npm dependencies up to date.
  # Directory was /web before the web → ui rename; corrected to /ui so
  # this ecosystem actually runs.
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group minor and patch updates
    groups:
      npm-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Keep the Dockerfile base images (node, golang, debian) up to date.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
