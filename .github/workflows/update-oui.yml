# =============================================================================
# Refresh Embedded IEEE OUI Database
# =============================================================================
# The MAC -> vendor lookup baseline is the IEEE OUI registry embedded into the
# binary at internal/discovery/resolve/oui.txt (via //go:embed). It is the single
# source of truth and goes stale at build time, so this workflow keeps it current:
#
#   1. Download the latest oui.txt from the official IEEE source.
#   2. Sanity-check it (size + format) so we never embed an error page.
#   3. If it changed, validate it builds + the resolve tests pass, then open a PR.
#
# It opens a PR (not a direct push to main) so the data change stays reviewed,
# version-controlled, and reproducible. Runs monthly + on demand.
# =============================================================================

name: Refresh OUI Database

on:
  schedule:
    # Monthly, 06:00 UTC on the 1st
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-oui
  cancel-in-progress: false

env:
  OUI_PATH: internal/discovery/resolve/oui.txt
  OUI_URL: https://standards-oui.ieee.org/oui/oui.txt

jobs:
  refresh-oui:
    name: Refresh embedded OUI registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download latest IEEE OUI registry
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          # Retry a few times — the IEEE host occasionally rate-limits.
          for attempt in 1 2 3; do
            if curl -fsSL --max-time 120 \
                -A "The Seed OUI refresh (+https://github.com/MustardSeedNetworks/seed)" \
                -o "$tmp" "$OUI_URL"; then
              break
            fi
            echo "download attempt $attempt failed; retrying..."
            sleep 10
          done

          # Sanity-check: a real registry is several MB and uses the "(hex)" format.
          size="$(wc -c < "$tmp")"
          if [ "$size" -lt 1000000 ]; then
            echo "::error::Downloaded OUI file too small ($size bytes) — refusing to embed."
            exit 1
          fi
          if ! grep -q '(hex)' "$tmp"; then
            echo "::error::Downloaded OUI file is not in IEEE (hex) format — refusing to embed."
            exit 1
          fi

          # The IEEE source is CRLF; the embedded file is pinned to LF
          # (.gitattributes) for byte-for-byte determinism — normalize before
          # writing so the validated bytes match the committed bytes.
          perl -pi -e 's/\r\n/\n/g' "$tmp"
          mv "$tmp" "$OUI_PATH"
          echo "Refreshed $OUI_PATH ($size bytes)"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- "$OUI_PATH"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "OUI registry unchanged — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.diff.outputs.changed == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate the refreshed registry parses and tests pass
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # CGO-free: the resolve package has no C deps.
          CGO_ENABLED=0 go build ./internal/discovery/resolve/...
          CGO_ENABLED=0 go test ./internal/discovery/resolve/... -run 'TestNewOUIDatabase|TestOUILookup' -count=1

      - name: Open refresh PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y%m%d)"
          branch="chore/oui-refresh-${stamp}"
          entries="$(grep -c '(hex)' "$OUI_PATH" || echo '?')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Reuse an open refresh branch if it already exists this run window.
          git switch -c "$branch" 2>/dev/null || git switch "$branch"
          git add "$OUI_PATH"
          git commit -m "chore(discovery): refresh embedded IEEE OUI registry (${stamp})"
          git push -u origin "$branch" --force-with-lease

          if gh pr view "$branch" >/dev/null 2>&1; then
            echo "PR for $branch already open — updated in place."
          else
            gh pr create \
              --title "chore(discovery): refresh embedded IEEE OUI registry (${stamp})" \
              --body "Automated monthly refresh of the embedded IEEE OUI registry (\`${OUI_PATH}\`, ~${entries} assignments) from ${OUI_URL}. Validated: builds + resolve lookup tests pass. Merge to ship the updated MAC→vendor baseline in the next build." \
              --label dependencies
          fi
